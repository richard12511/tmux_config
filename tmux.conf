# ~/.config/tmux/tmux.conf
# Adapted from Kun Chen's setup (expressed as a home-manager `programs.tmux`
# block in his nix config; translated here to a plain tmux.conf).
#
# Prefix: his screenshots didn't show a custom prefix, so this keeps tmux's
# default Ctrl+b. WezTerm's leader is Ctrl+Space, so the two never collide.

# --- prefix: remap from default Ctrl+b to Ctrl+a ---
set -g prefix C-a
unbind C-b                          # free up the old prefix
bind C-a send-prefix               # press Ctrl+a twice to send a literal Ctrl+a

# --- core options (from programs.tmux = { ... }) ---
set -g base-index 1                 # baseIndex = 1
setw -g pane-base-index 1           # match window numbering for panes
setw -g clock-mode-style 24         # clock24 = true
set -g focus-events on              # focusEvents = true
setw -g mode-keys vi                # keyMode = "vi"
set -g mouse on                     # mouse = true
set -g default-terminal "screen-256color"   # terminal = "screen-256color"
# truecolor passthrough so the rose-pine theme renders correctly (added)
set -ga terminal-overrides ",*256col*:Tc"

# --- extraConfig ---
set -g renumber-windows on
set -g escape-time 10
set -g extended-keys on
set -g extended-keys-format csi-u
set -g status-position top
set -g pane-border-lines heavy

# Inactive/active pane styling. His exact colors were cut off in the screenshot;
# left as 'default' so transparency/blur isn't broken. Tweak fg/bg to taste.
setw -g window-style 'default'
setw -g window-active-style 'default'

# --- per-pane agent labels (track what each agent is working on) ---
# A title bar on top of every pane. Uses a pane-scoped @agent variable so the
# label sticks even though Claude Code sets its own terminal title.
set -g pane-border-status top
set -g pane-border-format " #[bold]#{pane_index}#[nobold]#{?@agent, — #{@agent},} "
# Ctrl+a T -> prompt to (re)label the current pane
bind-key T command-prompt -p "agent label:" "set -p @agent '%%'"

# pane navigation (vim style, repeatable with -r)
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# pane resizing (repeatable): Shift + hjkl, same hand position as navigation
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# splits that keep the current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
bind-key & kill-window

# copy mode (vi) -> system clipboard via pbcopy
bind-key y copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send-keys -X cancel
# mouse drag-release copies the selection straight to the macOS clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- theme (rose-pine) ---
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'on'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_disable_active_window_menu 'on'
# His status-right date/time format was partially cut off; a simple one:
set -g @rose_pine_date_time '%Y-%m-%d %H:%M'

# --- plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be the LAST line). XDG path since this config lives
# under ~/.config/tmux/.
run '~/.config/tmux/plugins/tpm/tpm'
